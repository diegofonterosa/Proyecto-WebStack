version: '3.8'

services:
  # Base de datos compartida
  mysql:
    image: mysql:8.0
    container_name: tienda-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: tienda_db
      MYSQL_USER: tienda_user
      MYSQL_PASSWORD: tienda_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - tienda-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # API Gateway
  api-gateway:
    build: ./microservices/api-gateway
    container_name: tienda-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      ORDER_SERVICE_URL: http://order-service:5003
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
    ports:
      - "5000:5000"
    networks:
      - tienda-network
    depends_on:
      - auth-service
      - product-service
      - order-service
    restart: unless-stopped

  # Servicio de Autenticación
  auth-service:
    build: ./microservices/auth-service
    container_name: tienda-auth-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
    ports:
      - "5001:5001"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Servicio de Productos
  product-service:
    build: ./microservices/product-service
    container_name: tienda-product-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
    ports:
      - "5002:5002"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Servicio de Órdenes
  order-service:
    build: ./microservices/order-service
    container_name: tienda-order-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
    ports:
      - "5003:5003"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Frontend React
  frontend:
    build: ./frontend
    container_name: tienda-frontend
    ports:
      - "3000:3000"
    networks:
      - tienda-network
    depends_on:
      - api-gateway
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api

volumes:
  mysql-data:

networks:
  tienda-network:
    driver: bridge
