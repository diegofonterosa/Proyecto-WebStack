services:
  # Base de datos compartida
  mysql:
    image: mysql:8.0
    container_name: tienda-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: tienda_db
      MYSQL_USER: tienda_user
      MYSQL_PASSWORD: tienda_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./archive/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./archive/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./archive/database/03-strapi-init.sql:/docker-entrypoint-initdb.d/03-strapi-init.sql
    networks:
      - tienda-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: tienda-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      ORDER_SERVICE_URL: http://order-service:5003
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
      EJS_VIEWS_DIR: /app/views
      PUBLIC_ASSETS_DIR: /app/public-assets
    ports:
      - "5000:5000"
    volumes:
      - ./app/views:/app/views:ro
      - ./app/public:/app/public-assets:ro
    networks:
      - tienda-network
    depends_on:
      - auth-service
      - product-service
      - order-service
    restart: unless-stopped

  # Servicio de Autenticación
  auth-service:
    build: ./services/auth-service
    container_name: tienda-auth-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
    ports:
      - "5001:5001"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Servicio de Productos
  product-service:
    build: ./services/product-service
    container_name: tienda-product-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
    ports:
      - "5002:5002"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Servicio de Órdenes
  order-service:
    build: ./services/order-service
    container_name: tienda-order-service
    environment:
      DB_HOST: mysql
      DB_USER: tienda_user
      DB_PASS: tienda_pass123
      DB_NAME: tienda_db
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
    ports:
      - "5003:5003"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Strapi CMS
  strapi-cms:
    build: 
      context: ./services/strapi-cms
      dockerfile: Dockerfile.dev
    container_name: tienda-strapi-cms
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: strapi_db
      DATABASE_USER: strapi_user
      DATABASE_PASSWORD: strapi_pass
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      ADMIN_JWT_SECRET: tu_secreto_admin_jwt_muy_seguro_aqui
      JWT_SECRET: tu_secreto_jwt_muy_seguro_aqui
      API_URL: http://localhost:1337
      ADMIN_URL: http://localhost:1337/admin
    ports:
      - "1337:1337"
    networks:
      - tienda-network
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./services/strapi-cms:/app
      - /app/node_modules
      - /app/.cache
      - strapi-uploads:/app/public/uploads
    restart: unless-stopped

  # Frontend React
  frontend:
    build: ./archive/frontend
    container_name: tienda-frontend
    ports:
      - "3000:3000"
    networks:
      - tienda-network
    depends_on:
      - api-gateway
      - strapi-cms
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_CMS_URL: http://localhost:1337

volumes:
  mysql-data:
  strapi-uploads:

networks:
  tienda-network:
    driver: bridge
