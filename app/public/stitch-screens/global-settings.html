<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CMS Store Global Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<main class="flex flex-1 justify-center py-8 px-4 sm:px-10 lg:px-40">
<div class="layout-content-container flex flex-col max-w-[960px] w-full flex-1 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
<div class="flex flex-col gap-2"><h1 class="text-[32px] font-bold leading-tight">Store Global Settings</h1><p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-normal">Manage site configuration and global preferences.</p></div>
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors"><span>Save Changes</span></button>
</div>
<div class="p-8 space-y-10">
<section>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em] mb-6">General Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<label class="flex flex-col flex-1"><span class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Store Name</span><input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4" value="Milfshakes Clothing"/></label>
<label class="flex flex-col flex-1"><span class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Contact Email</span><input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4" type="email" value="hello@milfshakes.com"/></label>
</div>
</section>
<section>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em] mb-6">Localization</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<label class="flex flex-col flex-1"><span class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Base Currency</span><select class="form-select rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4"><option>USD ($) - United States Dollar</option></select></label>
<label class="flex flex-col flex-1"><span class="text-sm font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">Timezone</span><select class="form-select rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4"><option>(GMT-05:00) Eastern Time (US &amp; Canada)</option></select></label>
</div>
</section>
</div>
</div>
</main>
</div>
<script src="/stitch-screens/nav.js"></script>
</body></html>
