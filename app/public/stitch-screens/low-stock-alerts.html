<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Low Stock Alert Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body class="bg-slate-100">
    <main class="max-w-6xl mx-auto p-8 space-y-6">
      <h1 class="text-3xl font-bold">Inventory & Stock Alerts</h1>
      <section class="bg-white rounded-xl border p-6">
        <h2 class="text-xl font-semibold mb-3">Global Settings</h2>
        <div class="grid md:grid-cols-2 gap-3">
          <label class="text-sm"
            >Enable Low Stock Notifications
            <input type="checkbox" checked class="ml-2"
          /></label>
          <label class="text-sm"
            >Global Low Stock Threshold
            <input class="ml-2 border rounded p-1 w-20" value="15"
          /></label>
        </div>
      </section>
      <section class="bg-white rounded-xl border overflow-hidden">
        <table class="w-full">
          <thead class="bg-slate-50">
            <tr>
              <th class="p-3 text-left">Product Name</th>
              <th class="p-3 text-left">Category</th>
              <th class="p-3 text-left">Current Stock</th>
              <th class="p-3 text-left">Threshold</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="p-3">Classic Vanilla Base</td>
              <td class="p-3">Ingredients</td>
              <td class="p-3 text-red-700">8 L</td>
              <td class="p-3">20</td>
            </tr>
            <tr>
              <td class="p-3">Strawberry Syrup</td>
              <td class="p-3">Syrups</td>
              <td class="p-3">45 Btl</td>
              <td class="p-3">10</td>
            </tr>
            <tr>
              <td class="p-3">Large Paper Cups</td>
              <td class="p-3">Packaging</td>
              <td class="p-3">1250 Pcs</td>
              <td class="p-3">500</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  <script src="/stitch-screens/nav.js"></script>
</body>
</html>
