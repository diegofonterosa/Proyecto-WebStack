<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Add New Product Form</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body class="bg-slate-100">
    <main class="max-w-6xl mx-auto p-8">
      <h1 class="text-3xl font-bold mb-6">Add New Product</h1>
      <div class="grid lg:grid-cols-[1fr_360px] gap-6">
        <section class="space-y-6">
          <div class="bg-white border rounded-xl p-6">
            <h2 class="text-xl font-semibold mb-4">Product Information</h2>
            <input
              class="w-full border rounded-lg p-3 mb-3"
              placeholder="Product Name"
            /><textarea
              class="w-full border rounded-lg p-3 min-h-[180px]"
              placeholder="Describe the product..."
            ></textarea>
          </div>
          <div class="bg-white border rounded-xl p-6">
            <h2 class="text-xl font-semibold mb-4">Media</h2>
            <div
              class="border-2 border-dashed rounded-xl p-10 text-center text-slate-500"
            >
              Drag and drop your images here
            </div>
          </div>
          <div class="bg-white border rounded-xl p-6">
            <h2 class="text-xl font-semibold mb-4">Pricing</h2>
            <div class="grid md:grid-cols-2 gap-3">
              <input class="border rounded-lg p-3" placeholder="Price" /><input
                class="border rounded-lg p-3"
                placeholder="Compare-at Price"
              />
            </div>
          </div>
        </section>
        <aside class="space-y-6">
          <div class="bg-white border rounded-xl p-6">
            <h3 class="font-semibold mb-3">Product Status</h3>
            <p class="text-sm">Active / Draft</p>
          </div>
          <div class="bg-white border rounded-xl p-6">
            <h3 class="font-semibold mb-3">Organization</h3>
            <input
              class="w-full border rounded-lg p-3 mb-2"
              placeholder="Category"
            /><input class="w-full border rounded-lg p-3" placeholder="Tags" />
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
