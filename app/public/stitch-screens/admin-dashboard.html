<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Milfshakes CMS Admin Dashboard Overview</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#137fec','background-dark':'#101922','background-light':'#f6f7f8'},fontFamily:{display:['Inter']}}}}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex h-auto min-h-screen w-full flex-row overflow-x-hidden">
<div class="flex h-full min-h-screen flex-col justify-between bg-slate-100 dark:bg-slate-900 w-64 p-4 border-r border-slate-200 dark:border-slate-800 hidden md:flex">
<div class="flex flex-col gap-6"><h1 class="text-lg font-bold px-2">Milfshakes CMS</h1><div class="flex flex-col gap-1"><a class="px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-semibold" href="/admin/dashboard">Dashboard</a><a class="px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400" href="/admin/products">Products</a><a class="px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400" href="/admin/orders">Orders</a></div></div>
</div>
<div class="flex-1 flex flex-col h-screen overflow-y-auto">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-8 py-4"><h2 class="text-xl font-bold">Dashboard Overview</h2></header>
<div class="p-8 max-w-7xl mx-auto w-full flex flex-col gap-8">
<div><p class="tracking-tight text-3xl font-bold">Welcome back, Admin</p><p class="text-slate-500">Here is an overview of your store's performance today.</p></div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
<div class="rounded-xl p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"><p class="text-sm text-slate-500">Total Revenue</p><p class="text-3xl font-bold">$12,450.00</p></div>
<div class="rounded-xl p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"><p class="text-sm text-slate-500">Active Orders</p><p class="text-3xl font-bold">45</p></div>
<div class="rounded-xl p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"><p class="text-sm text-slate-500">Pending Shipments</p><p class="text-3xl font-bold">12</p></div>
<div class="rounded-xl p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"><p class="text-sm text-slate-500">Low Stock Alerts</p><p class="text-3xl font-bold">8</p></div>
</div>
</div>
</div>
</div>
<script src="/stitch-screens/nav.js"></script>
</body></html>
