<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Milfshakes E-commerce Homepage</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b6c",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221016",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d1b22",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">

</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-primary text-sm font-medium transition-colors" href="/storefront/catalog">Shop</a>
<a class="text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-primary text-sm font-medium transition-colors" href="/storefront/catalog">Collections</a>
<a class="text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-primary text-sm font-medium transition-colors" href="/storefront/home">About</a>
<a class="text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-primary text-sm font-medium transition-colors" href="/storefront/home">Contact</a>
</nav>
<div class="flex items-center gap-4">
<label class="hidden lg:flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-3 h-10 w-64 focus-within:ring-2 focus-within:ring-primary/50 transition-all">
<span class="material-symbols-outlined text-slate-400">search</span>
<input class="bg-transparent border-none focus:ring-0 text-sm w-full text-slate-900 dark:text-white placeholder-slate-400" placeholder="Search..." type="text"/>
</label>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors">

</button>
</div>
</div>
</div>
</header>
<main class="flex-1 w-full max-w-[1440px] mx-auto px-4 md:px-10 py-6">

<div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" style="background-image: url('/images/stitch/img-001.jpg');"></div>

<div class="flex gap-4 mt-4">

<a class="group relative rounded-lg overflow-hidden aspect-[4/5] bg-slate-200" href="/storefront/catalog"><div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-110" style="background-image: url('/images/stitch/img-012.jpg');"></div><div class="absolute inset-0 bg-black/20"></div><div class="absolute bottom-4 left-4"><h3 class="text-white font-bold text-lg">Denim</h3></div></a>
<a class="group relative rounded-lg overflow-hidden aspect-[4/5] bg-slate-200" href="/storefront/catalog"><div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-110" style="background-image: url('/images/stitch/img-002.jpg');"></div><div class="absolute inset-0 bg-black/20"></div><div class="absolute bottom-4 left-4"><h3 class="text-white font-bold text-lg">Tops</h3></div></a>

</div>
</section>
</main>
</div>
</body></html>
