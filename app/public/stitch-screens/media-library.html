<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CMS Media Library Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],

        >

            <h1 class="text-2xl font-bold tracking-tight">Media Library</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Manage and organize your store assets

          </div>
          <button
            class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm"
          >
            <span>Upload</span>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto p-8">
          <div
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"
          >
            <div class="group relative flex flex-col gap-2 cursor-pointer">
              <div

                </p>

            </div>
            <div class="group relative flex flex-col gap-2 cursor-pointer">
              <div
