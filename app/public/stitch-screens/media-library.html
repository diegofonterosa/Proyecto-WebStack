<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CMS Media Library Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <div class="flex h-screen overflow-hidden">
      <main
        class="flex-1 flex flex-col h-full bg-background-light dark:bg-background-dark relative"
      >
        <header
          class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-8 py-4 z-10"
        >
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Media Library</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Manage and organize your store assets
            </p>
          </div>
          <button
            class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm"
          >
            <span>Upload</span>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto p-8">
          <div
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"
          >
            <div class="group relative flex flex-col gap-2 cursor-pointer">
              <div
                class="aspect-square bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden border-2 border-primary relative"
              >
                <div
                  class="w-full h-full bg-cover bg-center"
                  style="
                    background-image: url(&quot;/images/stitch/img-001.jpg);
                  "
                ></div>
              </div>
              <div>
                <p class="text-sm font-medium truncate">Summer Sale Banner</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                  PNG • 1.2 MB
                </p>
              </div>
            </div>
            <div class="group relative flex flex-col gap-2 cursor-pointer">
              <div
                class="aspect-square bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"
              >
                <div
                  class="w-full h-full bg-cover bg-center"
                  style="
                    background-image: url(&quot;/images/stitch/img-001.jpg);
                  "
                ></div>
              </div>
              <div>
                <p class="text-sm font-medium truncate">Milfshake Logo</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                  SVG • 45 KB
                </p>
              </div>
            </div>
            <div class="group relative flex flex-col gap-2 cursor-pointer">
              <div
                class="aspect-square bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"
              >
                <div
                  class="w-full h-full bg-cover bg-center"
                  style="
                    background-image: url(&quot;/images/stitch/img-001.jpg);
                  "
                ></div>
              </div>
              <div>
                <p class="text-sm font-medium truncate">Promo Video</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                  MP4 • 15 MB
                </p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  
</body>
</html>
