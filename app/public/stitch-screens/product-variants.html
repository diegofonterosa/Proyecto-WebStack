<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Product Variant Management View</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body class="bg-slate-100">
    <main class="max-w-7xl mx-auto p-8 space-y-6">
      <h1 class="text-3xl font-bold">Manage Product Variants</h1>
      <section class="bg-white border rounded-xl p-6">
        <h2 class="text-xl font-semibold mb-4">Variant Options</h2>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <p class="text-sm mb-2">Size</p>
            <div class="flex gap-2 flex-wrap">
              <span class="px-3 py-1 rounded-full bg-slate-100">S</span
              ><span class="px-3 py-1 rounded-full bg-slate-100">M</span
              ><span class="px-3 py-1 rounded-full bg-slate-100">L</span
              ><span class="px-3 py-1 rounded-full bg-slate-100">XL</span>
            </div>
          </div>
          <div>
            <p class="text-sm mb-2">Color</p>
            <div class="flex gap-2 flex-wrap">
              <span class="px-3 py-1 rounded-full bg-slate-100">Black</span
              ><span class="px-3 py-1 rounded-full bg-slate-100">White</span
              ><span class="px-3 py-1 rounded-full bg-slate-100">Red</span>
            </div>
          </div>
        </div>
      </section>
      <section class="bg-white border rounded-xl overflow-hidden">
        <table class="w-full">
          <thead class="bg-slate-50">
            <tr>
              <th class="p-3 text-left">Variant</th>
              <th class="p-3 text-left">Price</th>
              <th class="p-3 text-left">SKU</th>
              <th class="p-3 text-left">Stock</th>
              <th class="p-3 text-left">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="p-3">S / Black</td>
              <td class="p-3">$15.00</td>
              <td class="p-3">MS-CL-S-BLK</td>
              <td class="p-3">50</td>
              <td class="p-3">Active</td>
            </tr>
            <tr>
              <td class="p-3">M / Black</td>
              <td class="p-3">$18.00</td>
              <td class="p-3">MS-CL-M-BLK</td>
              <td class="p-3">35</td>
              <td class="p-3">Active</td>
            </tr>
            <tr>
              <td class="p-3">L / White</td>
              <td class="p-3">$22.00</td>
              <td class="p-3">MS-CL-L-WHT</td>
              <td class="p-3">0</td>
              <td class="p-3">Inactive</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
