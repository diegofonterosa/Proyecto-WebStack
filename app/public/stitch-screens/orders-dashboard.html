<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Milfshakes CMS Order Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100">
    <main class="max-w-7xl mx-auto p-8 space-y-6">
      <h1 class="text-3xl font-bold">Order Management</h1>
      <div class="bg-white rounded-xl border overflow-hidden">
        <table class="w-full">
          <thead class="bg-slate-50">
            <tr>
              <th class="p-3 text-left">Order ID</th>
              <th class="p-3 text-left">Date</th>
              <th class="p-3 text-left">Customer</th>
              <th class="p-3 text-left">Payment Status</th>
              <th class="p-3 text-left">Shipping Status</th>
              <th class="p-3 text-right">Total Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="p-3">#MS-1045</td>
              <td class="p-3">Oct 24, 2023</td>
              <td class="p-3">Jane Doe</td>
              <td class="p-3 text-emerald-700">Paid</td>
              <td class="p-3 text-amber-700">Processing</td>
              <td class="p-3 text-right">$124.50</td>
            </tr>
            <tr>
              <td class="p-3">#MS-1044</td>
              <td class="p-3">Oct 23, 2023</td>
              <td class="p-3">Alice Smith</td>
              <td class="p-3 text-slate-600">Refunded</td>
              <td class="p-3 text-blue-700">Shipped</td>
              <td class="p-3 text-right">$89.00</td>
            </tr>
            <tr>
              <td class="p-3">#MS-1043</td>
              <td class="p-3">Oct 23, 2023</td>
              <td class="p-3">Bob Johnson</td>
              <td class="p-3 text-emerald-700">Paid</td>
              <td class="p-3 text-indigo-700">Delivered</td>
              <td class="p-3 text-right">$210.00</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
