<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMS Product Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-slate-950 text-slate-100"
    style="font-family: Inter, sans-serif"
  >
    <main class="max-w-7xl mx-auto p-8 space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">Product Management</h1>
        <button class="px-4 py-2 rounded-lg bg-sky-600">Add Product</button>
      </div>
      <div
        class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden"
      >
        <table class="w-full">
          <thead>
            <tr class="bg-slate-800">
              <th class="p-3 text-left">Product Name</th>
              <th class="p-3 text-left">SKU</th>
              <th class="p-3 text-left">Category</th>
              <th class="p-3 text-left">Price</th>
              <th class="p-3 text-left">Stock</th>
              <th class="p-3 text-left">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-slate-800">
              <td class="p-3">Milfshakes Logo Black T-Shirt</td>
              <td class="p-3">MS-TEE-BLK-M</td>
              <td class="p-3">T-shirts</td>
              <td class="p-3">$25.00</td>
              <td class="p-3">80</td>
              <td class="p-3 text-emerald-400">Published</td>
            </tr>
            <tr class="border-t border-slate-800">
              <td class="p-3">Classic Hoodie Grey</td>
              <td class="p-3">MS-HDY-GRY-L</td>
              <td class="p-3">Hoodies</td>
              <td class="p-3">$45.00</td>
              <td class="p-3">45</td>
              <td class="p-3 text-emerald-400">Published</td>
            </tr>
            <tr class="border-t border-slate-800">
              <td class="p-3">Vintage Wash Denim Jacket</td>
              <td class="p-3">MS-JAC-DEN-S</td>
              <td class="p-3">Outerwear</td>
              <td class="p-3">$85.00</td>
              <td class="p-3">15</td>
              <td class="p-3 text-slate-400">Draft</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
