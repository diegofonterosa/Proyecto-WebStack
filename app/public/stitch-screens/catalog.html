<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Milfshakes Product Catalog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ee2b6c",
              "background-light": "#f8f6f6",
              "background-dark": "#221016",
              "surface-light": "#ffffff",
              "surface-dark": "#2d1b22",
              "text-main": "#181113",
              "text-muted": "#89616f",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background-light text-text-main antialiased min-h-screen flex flex-col">
<header class="sticky top-0 z-50 bg-surface-light border-b border-[#f4f0f2] px-6 lg:px-10 py-4 shadow-sm">
  <div class="max-w-[1440px] mx-auto flex items-center justify-between gap-4">
    <div class="flex items-center gap-2 lg:gap-4 text-primary">
      <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined text-[20px]">icecream</span></div>
      <h2 class="text-text-main text-xl lg:text-2xl font-black tracking-tight">Milfshakes</h2>
    </div>
    <nav class="hidden md:flex items-center gap-8">
      <a class="text-text-main hover:text-primary font-bold text-sm transition-colors" href="/storefront/catalog">Shop</a>
      <a class="text-text-muted hover:text-primary font-medium text-sm transition-colors" href="/storefront/catalog">New Arrivals</a>
      <a class="text-text-muted hover:text-primary font-medium text-sm transition-colors" href="/storefront/catalog">Collections</a>
      <a class="text-text-muted hover:text-primary font-medium text-sm transition-colors" href="/storefront/catalog">Sale</a>
    </nav>
  </div>
</header>
<main class="flex-grow w-full max-w-[1440px] mx-auto px-6 lg:px-10 py-8">
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight text-text-main">New Arrivals</h1>
      <p class="text-text-muted mt-2 max-w-xl">Discover our latest collection of sustainable, comfortable, and stylish apparel designed for everyday confidence.</p>
    </div>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="group flex flex-col gap-3"><div class="relative aspect-[3/4] overflow-hidden rounded-xl bg-gray-100"><img class="h-full w-full object-cover object-center transition-transform duration-500 group-hover:scale-105" src="/images/stitch/img-007.jpg"/></div><h3 class="font-bold">Essential Cotton Tee</h3><p class="text-primary font-bold">$35.00</p></div>
    <div class="group flex flex-col gap-3"><div class="relative aspect-[3/4] overflow-hidden rounded-xl bg-gray-100"><img class="h-full w-full object-cover object-center transition-transform duration-500 group-hover:scale-105" src="/images/stitch/img-009.jpg"/></div><h3 class="font-bold">Summer Breeze Dress</h3><p class="text-primary font-bold">$89.00</p></div>
    <div class="group flex flex-col gap-3"><div class="relative aspect-[3/4] overflow-hidden rounded-xl bg-gray-100"><img class="h-full w-full object-cover object-center transition-transform duration-500 group-hover:scale-105" src="/images/stitch/img-011.jpg"/></div><h3 class="font-bold">Classic Denim Jacket</h3><p class="text-primary font-bold">$65.00</p></div>
  </div>
</main>
</body></html>
