<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milfshakes Product Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Work Sans", sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="sticky top-0 bg-white border-b border-slate-200 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <p class="text-xs uppercase tracking-wide text-slate-500">storefront</p>
        <h1 class="font-bold text-lg">Milfshakes Product Catalog</h1>
      </div>
      <a href="/stitch" class="text-sm text-sky-700 hover:underline">Volver al hub</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <section class="bg-white border border-slate-200 rounded-xl p-8">
      <h2 class="text-2xl font-bold">Milfshakes Product Catalog</h2>
      <p class="text-slate-600 mt-2">Pantalla integrada en ruta final del proyecto.</p>
      <div class="mt-6 grid sm:grid-cols-3 gap-4">
        <article class="p-4 rounded-lg bg-slate-50 border border-slate-200">
          <p class="text-xs uppercase text-slate-500">Slug</p>
          <p class="font-semibold mt-1">catalog</p>
        </article>
        <article class="p-4 rounded-lg bg-slate-50 border border-slate-200">
          <p class="text-xs uppercase text-slate-500">Ruta</p>
          <p class="font-semibold mt-1">/stitch/catalog</p>
        </article>
        <article class="p-4 rounded-lg bg-slate-50 border border-slate-200">
          <p class="text-xs uppercase text-slate-500">Estado</p>
          <p class="font-semibold mt-1 text-emerald-700">Activa</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
