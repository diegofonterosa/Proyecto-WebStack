name: E2E Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for compose validation
        run: cp .env.example .env

      - name: Run CI sanity checks
        run: bash archive/scripts/ci-sanity.sh

  smoke-test:
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'rootpass123' }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD || 'tienda_pass123' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_jwt_secret_insecure_32chars_x' }}
          STRAPI_DB_PASSWORD: ${{ secrets.STRAPI_DB_PASSWORD || 'strapi_pass' }}
          STRAPI_ADMIN_JWT_SECRET: ${{ secrets.STRAPI_ADMIN_JWT_SECRET || 'ci_admin_jwt_insecure_32chars_xx' }}
        run: |
          printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD" >> .env
          printf 'MYSQL_DATABASE=tienda_db\n' >> .env
          printf 'MYSQL_USER=tienda_user\n' >> .env
          printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD" >> .env
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
          printf 'STRAPI_DB_PASSWORD=%s\n' "$STRAPI_DB_PASSWORD" >> .env
          printf 'STRAPI_ADMIN_JWT_SECRET=%s\n' "$STRAPI_ADMIN_JWT_SECRET" >> .env
          printf 'STRAPI_APP_KEYS=a2V5MQ==,a2V5Mg==,a2V5Mw==,a2V5NA==\n' >> .env

      - name: Prepare smoke script
        run: chmod +x archive/scripts/e2e-smoke.sh

      - name: Start required services
        run: docker compose up -d mysql auth-service product-service order-service api-gateway

      - name: Wait for gateway health
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/health >/dev/null; then
              echo "Gateway is ready"
              exit 0
            fi
            echo "Waiting for gateway... ($i/60)"
            sleep 2
          done
          echo "Gateway did not become ready in time"
          exit 1

      - name: Run E2E smoke test
        run: ./archive/scripts/e2e-smoke.sh

      - name: Run API integration tests
        run: bash tests/run.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop services
        if: always()
        run: docker compose down -v